# GxpCode-制药法规跟踪 — 用户偏好配置

# 企业注册分类（多选：化药 / 中药 / 生物制品 / 原料药 / 辅料包材）
enterprise_type:
  - 化药

# 重点关注领域（多选，选填。可选：GMP / 注册 / 变更 / 稳定性 /
#   工艺验证 / 分析方法 / 杂质 / 临床试验 / 药物警戒）
focus_areas:
  - GMP
  - 注册

# 适用企业分类规则（Step 5 Agent 用）
# 每条规则：关键词匹配标题+摘要 → 分配对应企业类型
# 匹配顺序：从上到下，命中即用。未命中 → 通用
product_types:
  - keywords: [化药, 化学药品, 化学仿制药, 仿制药, 参比制剂, 注射剂, 固体制剂, 口服, 包材, 包装规格, 缺陷情形]
    label: 化药

  - keywords: [生物制品, 生物类似药, 类似药, mRNA, 疫苗, 重组蛋白, 抗体, 胰岛素, 预防用, 治疗用蛋白]
    label: 生物制品

  - keywords: [中药, 中成药, 饮片, 经典名方]
    label: 中药

  - keywords: [原料药]
    label: 原料药

  - keywords: [辅料]
    label: 辅料包材

  - keywords: [临床评价, 临床试验申请, 上市申请, 临床研发, 新生儿, 儿童, 低龄儿, 儿科, 附条件]
    label: 化药; 中药; 生物制品
